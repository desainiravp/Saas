apiVersion: apps/v1
kind: Deployment
metadata:
  name: saas-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: nirav1611/microservice:backend-latest
        ports:
        - containerPort: 5000
