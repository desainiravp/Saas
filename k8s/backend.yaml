apiVersion: apps/v1
kind: Deployment
metadata:
  name: saas-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: saas-backend
  template:
    metadata:
      labels:
        app: saas-backend
    spec:
      containers:
      - name: backend
        image: nirav1611/microservice:backend-latest
        imagePullPolicy: Always
        ports:
        - containerPort: 5000
        env:
        - name: DB_HOST
          value: "postgres-service"
        - name: DB_NAME
          value: "saas"
        - name: DB_USER
          value: "postgres"
        - name: DB_PASSWORD
          value: "example"
        - name: DB_PORT
          value: "5432"
